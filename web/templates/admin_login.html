{% extends "base.html" %}
{% block title %}Admin - SACT{% endblock %}
{% block content %}
<div class="sact-container narrow">
  <div class="sact-title">🛡️ Dang nhap Quan tri</div>
  {% if error %}<div class="sact-alert danger">{{ error }}</div>{% endif %}
  <div class="sact-card">
    <form method="POST">
      <label class="sact-label">Ten dang nhap</label>
      <input type="text" name="username" class="sact-input" required>
      <label class="sact-label">Mat khau</label>
      <input type="password" name="password" class="sact-input" required>
      <button type="submit" class="sact-btn" style="width:100%;">Dang nhap</button>
    </form>
  </div>
</div>
{% endblock %}

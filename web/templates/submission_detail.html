{% extends "base.html" %}
{% block title %}Chi tiet - SACT{% endblock %}
{% block content %}
<div class="sact-container">
  <div class="sact-title">Chi tiet Submission #{{ submission_id }}</div>
  <div class="sact-card">
    <table class="sact-table">
      <thead><tr><th>Chunk #</th><th>Hash</th><th>Ket qua</th><th>Thoi gian</th></tr></thead>
      <tbody>
        {% for c in chunk_logs %}
        <tr>
          <td>{{ c.chunk_index }}</td>
          <td><code>{{ c.hash_chunk }}</code></td>
          <td><span class="sact-badge {{ c.ket_qua }}">{{ c.ket_qua }}</span></td>
          <td>{{ c.thoi_gian }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

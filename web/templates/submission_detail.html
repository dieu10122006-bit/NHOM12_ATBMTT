<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiet Submission</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <h1 class="mb-4">Chi tiet Submission #{{ submission_id }}</h1>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary mb-3">⬅ Quay lai danh sach</a>
  <table class="table table-bordered bg-white">
    <thead><tr><th>Chunk #</th><th>Hash</th><th>Ket qua</th><th>Thoi gian</th></tr></thead>
    <tbody>
      {% for c in chunk_logs %}
      <tr>
        <td>{{ c.chunk_index }}</td>
        <td><code>{{ c.hash_chunk }}</code></td>
        <td>
          {% if c.ket_qua == "valid" %}<span class="badge bg-success">valid</span>
          {% else %}<span class="badge bg-danger">{{ c.ket_qua }}</span>{% endif %}
        </td>
        <td>{{ c.thoi_gian }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>

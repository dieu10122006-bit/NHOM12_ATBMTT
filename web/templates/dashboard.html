{% extends "base.html" %}
{% block title %}Lich su - SACT{% endblock %}
{% block content %}
<div class="sact-container">
  <div class="sact-title">📊 Lich su nop bai</div>
  <div class="sact-card">
    <table class="sact-table">
      <thead><tr><th>ID</th><th>File</th><th>So chunk</th><th>Trang thai</th><th>Thoi gian</th><th></th></tr></thead>
      <tbody>
        {% for s in submissions %}
        <tr>
          <td>{{ s.id }}</td><td>{{ s.ten_file }}</td><td>{{ s.tong_so_chunk }}</td>
          <td><span class="sact-badge {{ s.trang_thai }}">{{ s.trang_thai }}</span></td>
          <td>{{ s.thoi_gian_nop }}</td>
          <td><a href="{{ url_for('submission_detail', submission_id=s.id) }}" class="sact-btn outline" style="font-size:12px; padding:6px 12px;">Chi tiet</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

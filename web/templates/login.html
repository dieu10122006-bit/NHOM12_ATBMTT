<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dang nhap - SACT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 420px;">
  <h2 class="mb-4">🔒 Dang nhap SACT</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="POST" class="card card-body">
    <div class="mb-3">
      <label class="form-label">Ma so sinh vien</label>
      <input type="text" name="msv" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Mat khau</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Dang nhap</button>
  </form>
  <p class="mt-3 text-center">Chua co tai khoan? <a href="{{ url_for('register') }}">Dang ky</a></p>
</div>
</body>
</html>

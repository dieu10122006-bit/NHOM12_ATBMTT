{% extends "base.html" %}
{% block title %}Dang nhap - SACT{% endblock %}
{% block content %}
<div class="sact-container narrow">
  <div class="sact-title">Dang nhap</div>
  <div class="sact-subtitle">Danh cho sinh vien nop bai</div>
  {% if error %}<div class="sact-alert danger">{{ error }}</div>{% endif %}
  <div class="sact-card">
    <form method="POST">
      <label class="sact-label">Ma so sinh vien</label>
      <input type="text" name="msv" class="sact-input" required>
      <label class="sact-label">Mat khau</label>
      <input type="password" name="password" class="sact-input" required>
      <button type="submit" class="sact-btn" style="width:100%;">Dang nhap</button>
    </form>
  </div>
  <div class="sact-footer-link">Chua co tai khoan? <a href="{{ url_for('register') }}">Dang ky</a></div>
</div>
{% endblock %}

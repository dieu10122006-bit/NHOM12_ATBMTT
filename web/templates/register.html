<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dang ky - SACT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 480px;">
  <h2 class="mb-4">📝 Dang ky tai khoan sinh vien</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="alert alert-success">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  <form method="POST" class="card card-body">
    <div class="mb-3">
      <label class="form-label">Ho ten</label>
      <input type="text" name="ho_ten" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Ma so sinh vien</label>
      <input type="text" name="msv" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Mat khau</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Dang ky</button>
  </form>
  <p class="mt-3 text-center">Da co tai khoan? <a href="{{ url_for('login') }}">Dang nhap</a></p>
</div>
</body>
</html>
